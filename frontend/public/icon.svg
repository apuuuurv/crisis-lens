<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="40" fill="#1A1C1E"/>
  <!-- Outer Radial Scan -->
  <circle cx="90" cy="90" r="70" stroke="#10b981" stroke-width="2" stroke-dasharray="10 5" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 90 90" to="360 90 90" dur="10s" repeatCount="indefinite" />
  </circle>
  <!-- Lens Body -->
  <circle cx="90" cy="90" r="50" stroke="#10b981" stroke-width="8"/>
  <!-- Inner Lens / Shutter -->
  <circle cx="90" cy="90" r="25" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="2"/>
  <circle cx="90" cy="90" r="10" fill="#10b981"/>
  <!-- Crosshair -->
  <path d="M90 20V40M90 140V160M20 90H40M140 90H160" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <!-- Decorative Corner Accents -->
  <path d="M40 25H25V40" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 25H155V40" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <path d="M40 155H25V140" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 155H155V140" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
</svg>